---
# tasks file for playbooks/roles/ban_krawl_ips
- name: get krawl classified ips from krawl instances
  ansible.builtin.uri:
    url: "{{ item }}"
    method: GET
    return_content: true
  register: krawl_api_response
  loop: "{{ ban_krawl_ips_urls }}"

- name: set fact with krawl classified ips
  ansible.builtin.set_fact:
    krawl_classified_ips: "{{ krawl_api_response.results | map(attribute='content') | flatten | join ('\n') | split('\n') | unique }}"

- name: Block krawl classified ips
  become: true
  ansible.builtin.iptables:
    chain: INPUT
    source: "{{ item }}"
    jump: DROP
  register: result
  loop: "{{ krawl_classified_ips }}"

- name: Notify about blocked ips via telegram
  when: result.results | selectattr('changed', 'equalto', true) | list | length > 0
  community.general.telegram:
    token: "{{ vault_telegram_token }}"
    api_args:
      chat_id: "{{ vault_telegram_chat_id }}"
      parse_mode: "markdown"
      text: |
        *Krawl attack detected and mitigated on {{ inventory_hostname }}*
        The following IPs have been blocked:

        {% for ip in (result.results | selectattr('changed', 'equalto', true) | map(attribute='item') | list )%}
          - `{{ ip }}`
        {% endfor %}
      disable_web_page_preview: true
      disable_notification: false
