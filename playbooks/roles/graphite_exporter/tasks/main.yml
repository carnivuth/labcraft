---
# tasks file for playbooks/roles/graphite_exporter

- name: Create directory for carbon-relay-ng
  become: true
  ansible.builtin.file:
    path: "/usr/local/carbon-relay-ng/config"
    state: directory
    mode: "0755"

- name: Install carbon-relay-ng configuration file
  become: true
  ansible.builtin.template:
    src: "carbon-relay-ng.ini.j2"
    dest: "/usr/local/carbon-relay-ng/config/carbon-relay-ng.ini"
    mode: "0600"
    owner: root

- name: Install carbon-relay-ng storage schemas configuration file
  become: true
  ansible.builtin.copy:
    src: "storage-schemas.conf"
    dest: "/usr/local/carbon-relay-ng/config/storage-schemas.conf"
    mode: "0644"
    owner: root

- name: Install carbon-relay-ng storage aggregation configuration file
  become: true
  ansible.builtin.copy:
    src: "storage-aggregation.conf"
    dest: "/usr/local/carbon-relay-ng/config/storage-aggregation.conf"
    mode: "0644"
    owner: root

- name: install docker compose file
  become: true
  ansible.builtin.copy:
    src: "docker-compose.yml"
    dest: "/usr/local/carbon-relay-ng/docker-compose.yml"
    mode: "0644"
    owner: root

- name: Start carbon-relay-ng
  become: true
  community.docker.docker_compose_v2:
    project_src: "/usr/local/carbon-relay-ng"
    state: present
    pull: always
  retries: 5
  delay: 1
