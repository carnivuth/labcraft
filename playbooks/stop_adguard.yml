---
- name: Install docker applications
  hosts: 192.168.1.202
  tasks:

    - name: Stop adguard
      become: true
      community.docker.docker_compose_v2:
        project_src: "/usr/local/adguard"
        state: absent
        pull: always
      retries: 5
      delay: 1

    - name: Restart ddclient
      become: true
      ansible.builtin.service:
        name: ddclient
        state: restarted
