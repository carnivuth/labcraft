services:
  actual:
    image: docker.io/actualbudget/actual-server:26.3.0
    container_name: actual
    restart: unless-stopped

    networks:
      - services
    environment:
      # Uncomment any of the lines below to set configuration options.
      # - ACTUAL_HTTPS_KEY=/data/selfhost.key
      # - ACTUAL_HTTPS_CERT=/data/selfhost.crt
      - ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB=20
      - ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB=50
      - ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB=20
      # See all options and more details at https://actualbudget.org/docs/config/
    volumes:
      # Change './actual-data' below to the path to the folder you want Actual to store its data in on your server.
      # '/data' is the path Actual will look for its files in by default, so leave that as-is.
      - /mnt/containers/actual:/data
    healthcheck:
      # Enable health check for the instance
      test: ['CMD-SHELL', 'node src/scripts/health-check.js']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      # traefik labels
      - "traefik.enable=true"
      - "traefik.http.services.actual.loadbalancer.server.port=5006"
      # default entrypoint with authelia authentincation
      - "traefik.http.routers.actual.entrypoints=websecure"
      - "traefik.http.routers.actual.tls.certresolver=myresolver"
      - "traefik.http.routers.actual.rule=Host(`${HOST}`)"

      # homepage labels
      - "homepage.group=Personal Cloud"
      - "homepage.name=Actual"
      - "homepage.icon=actual-budget.svg"
      - "homepage.href=https://${HOST}"
      - "homepage.description=Budgeting service"

      # diun labels
      - "diun.enable=true"
      - "diun.watch_repo=true"
      - "diun.sort_tags=semver"
      - "diun.max_tags=3"
networks:
  services:
    name: services
    external: true
