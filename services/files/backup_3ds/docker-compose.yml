services:
  backup_3ds:
    restart: unless-stopped
    container_name: backup_3ds
    image: carnivuth/backup_3ds:v2.0.1
    environment:
      - FTPD_3DS_ADDRESSES=${FTPD_3DS_ADDRESSES}
      - FTPD_3DS_PORTS=${FTPD_3DS_PORTS}
      - BACKUP_DIRS=/3ds/Checkpoint/saves;/roms/nds/saves
    volumes:
      - "/mnt/containers/backup_3ds:/var/lib/backup_3ds"
    labels:
      - "diun.enable=true"
