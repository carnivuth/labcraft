---
services:
  freshrss:
    image: freshrss/freshrss:1.28.1
    container_name: freshrss
    hostname: freshrss
    restart: unless-stopped
    logging:
      options:
        max-size: 10m
    volumes:
      - /mnt/containers/freshrss/data:/var/www/FreshRSS/data
      - /mnt/containers/freshrss/extensions:/var/www/FreshRSS/extensions
    environment:
      - TZ=Europe/Rome
      - CRON_MIN=3,33
      - BASE_URL=https://${HOST}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_PASSWORD=${ADMIN_API_PASSWORD}
        # Published port if running locally

    networks:
      - services
    labels:
      # traefik labels
      - "traefik.enable=true"
      - "traefik.http.routers.freshrss.rule=Host(`${HOST}`)"
      - "traefik.http.services.freshrss.loadbalancer.server.port=80"
      - "traefik.http.routers.freshrss.entrypoints=websecure"
      - "traefik.http.routers.freshrss.tls=true"
      - "traefik.http.routers.freshrss.tls.certresolver=myresolver"

      # homepage labels
      - "homepage.group=Personal Cloud"
      - "homepage.name=FreshRSS"
      - "homepage.icon=freshrss.svg"
      - "homepage.href=https://${HOST}"
      - "homepage.description=Feed aggregator"

      # diun labels
      - "diun.enable=true"
      - "diun.watch_repo=true"
      - "diun.sort_tags=semver"
      - "diun.max_tags=3"
networks:
  services:
    name: services
    external: true
