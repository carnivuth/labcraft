services:
  metube:
    image: ghcr.io/alexta69/metube:2026.04.28
    container_name: metube
    restart: unless-stopped
    networks:
      - services
    ports:
      - "8081:8081"
    volumes:
      - /mnt/contianers/metube/downloads:/downloads
    labels:
      # traefik labels
      - "traefik.enable=true"
      - "traefik.http.services.navidrome.loadbalancer.server.port=8081"
      # default entrypoint with authelia authentincation
      - "traefik.http.routers.navidrome.entrypoints=websecure"
      - "traefik.http.routers.navidrome.tls.certresolver=myresolver"
      - "traefik.http.routers.navidrome.rule=Host(`${HOST}`)"
      - "traefik.http.routers.navidrome.middlewares=authelia@docker"
      # homepage labels
      - "homepage.group=Personal Cloud"
      - "homepage.name=Metube"
      - "homepage.icon=metube.svg"
      - "homepage.href=https://${HOST}"
      - "homepage.description=yt downlader"
      # diun labels
      - "diun.enable=false"

networks:
  services:
    name: services
    external: true
